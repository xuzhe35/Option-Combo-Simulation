[tws]
host = 127.0.0.1
port = 7496
client_id = 999

[server]
ws_host = 127.0.0.1
ws_port = 8765
; Exact option last-trade timing is requested once per conId from IB
; ContractDetails. On timeout a profile cutoff is diagnostic/compatibility
; data only; live target-expiry, FOP/INDEX, and <=7-day surviving legs fail
; closed until exact contract timing arrives.
option_contract_timing_timeout_seconds = 5

[execution]
managed_reprice_threshold_default = 0.01
managed_reprice_interval_seconds = 2.0
managed_reprice_max_updates = 12
managed_reprice_timeout_seconds = 600

[iv_term_structure]
; How long IB gets to resolve the contract/option-chain catalog before the
; server gives up and tells the browser which farm to check. Raise it when a
; slow sec-def farm (2158) makes wide FOP chains legitimately overrun; the
; browser's own backstop is 90s, so keep this below that or the client times
; out first with a message that names no cause. Values below 1s are floored.
catalog_timeout_seconds = 75

[yield_curve]
; One standalone daily USD reference curve is shared by the live workspace,
; historical replay, Chart Lab, and IV Term Structure.  Run it manually with:
;   python -m yield_curve update
; The backends only read these JSON snapshots. If today's file is missing or
; stale they may start that independent updater once through the same Python
; interpreter; no rate downloader or periodic refresh loop lives in a server.
data_dir = yield_curve/data
auto_update_if_missing = true
auto_update_if_stale = true
source_timeout_seconds = 20
process_timeout_seconds = 60

[historical]
; Option chains + underlying bars come from a swappable data service outside
; this repo. Only the URL matters at runtime — everything downstream is HTTP —
; so pointing this at a different provider is the whole migration.
; Override for a single run without editing this file:
;   OPTION_COMBO_CHAIN_SERVICE_URL=... ./start_historical_replay_mac.command
chain_service_url = http://127.0.0.1:8750
; Where that service's chain_server.py lives, so the replay launchers can start
; it for you. Relative paths resolve against this repo, not the shell's cwd;
; the default assumes the historical layout of this repo sitting at
; <workspace>/projects/Option Combo Simulation next to <workspace>/Options DB.
; Set an absolute path after moving either project, or leave it EMPTY when the
; service is remote/vendor-hosted and not ours to start.
; Env override: OPTION_COMBO_CHAIN_SERVICE_DIR
chain_service_dir = ../../Options DB/chain_service
; Risk-free rate + treasury yield curve stay local (tiny DB extracted from the
; legacy bundled sqlite by scripts/extract_rates_db.py).
rates_sqlite_db_path = sqlite_spy/rates.db
