[tws]
host = 127.0.0.1
port = 7496
client_id = 999

[server]
ws_host = 127.0.0.1
ws_port = 8765
; WebSocket auth: 'auto' requires the token as soon as ws_host includes a
; non-loopback address (Tailscale/LAN). 'always' / 'never' override.
require_auth = auto
; Token file is created on first run and reused across restarts. The default
; lives outside the project tree so cloud-synced folders never see it.
; auth_token_path = ~/.option_combo/ws_auth_token
; Optional explicit token (set it in config.local.ini, never commit it).
; auth_token = ...
; Extra browser origin hosts allowed besides loopback and ws_host entries.
; allowed_origin_hosts = my-desktop.tailnet.ts.net

[execution]
managed_reprice_threshold_default = 0.01
managed_reprice_interval_seconds = 2.0
managed_reprice_max_updates = 12
managed_reprice_timeout_seconds = 600
; Server-side kill switch: false rejects submit/resume/concede actions
; (cancels stay allowed).
allow_live_orders = true
